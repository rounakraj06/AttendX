{% load static %}
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Edit Profile</title>

<style>

body{
background:#f4f7fb;
font-family:Arial;
}

.container{
width:500px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

a{
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Edit Profile</h2>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<label>Profile Photo</label>

<input type="file" name="profile_photo">

<label>University Roll Number</label>

<input
type="text"
name="university_roll_number"
value="{{ student.university_roll_number }}">

<label>Registration Number</label>

<input
type="text"
name="registration_number"
value="{{ student.registration_number }}">

<label>Mobile</label>

<input
type="text"
name="mobile"
value="{{ student.mobile }}">

<label>Email</label>

<input
type="email"
name="email"
value="{{ student.email }}">

<label>Address</label>

<textarea
name="address">{{ student.address }}</textarea>

<button type="submit">

Save Changes

</button>

</form>

<br>

<a href="{% url 'profile' %}">

← Back to Profile

</a>

</div>

</body>

</html>
