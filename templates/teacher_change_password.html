<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Change Password</title>

<style>

body{
background:#f4f7fb;
font-family:Arial,sans-serif;
}

.container{
width:420px;
margin:60px auto;
background:#fff;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1d4ed8;
}

.message{
padding:10px;
margin-bottom:15px;
border-radius:6px;
text-align:center;
}

.success{
background:#dcfce7;
color:#166534;
}

.error{
background:#fee2e2;
color:#b91c1c;
}

.back{
display:block;
text-align:center;
margin-top:20px;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h2>🔑 Change Password</h2>

{% if messages %}
    {% for message in messages %}
        <div class="message {% if message.tags == 'success' %}success{% else %}error{% endif %}">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<form method="POST">

{% csrf_token %}

<input
type="password"
name="current_password"
placeholder="Current Password"
required>

<input
type="password"
name="new_password"
placeholder="New Password"
required>

<input
type="password"
name="confirm_password"
placeholder="Confirm New Password"
required>

<button type="submit">
Change Password
</button>

</form>

<a href="{% url 'teacher_dashboard' %}" class="back">
← Back to Dashboard
</a>

</div>

</body>

</html>
