{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notes | AttendX</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f7fb;
}

header{
background:#2563eb;
color:#fff;
padding:30px 20px;
text-align:center;
}

header h1{
font-size:32px;
margin-bottom:10px;
}

header p{
font-size:16px;
opacity:.9;
}

.container{
max-width:1000px;
margin:40px auto;
padding:0 20px;
}

.semester-card{
background:#fff;
border-radius:12px;
padding:22px;
margin-bottom:18px;
display:flex;
justify-content:space-between;
align-items:center;
text-decoration:none;
color:#1e293b;
box-shadow:0 5px 15px rgba(0,0,0,.08);
transition:.3s;
}

.semester-card:hover{
transform:translateY(-4px);
box-shadow:0 10px 20px rgba(0,0,0,.12);
}

.left{
display:flex;
align-items:center;
gap:15px;
}

.left i{
font-size:28px;
color:#2563eb;
}

.left h3{
font-size:22px;
}

.arrow{
font-size:24px;
color:#2563eb;
}

footer{
text-align:center;
padding:25px;
color:#666;
font-size:14px;
}

@media(max-width:768px){

header h1{
font-size:25px;
}

.semester-card{
padding:18px;
}

.left h3{
font-size:18px;
}

.left i{
font-size:24px;
}

}

</style>

</head>

<body>

<header>

<h1>📚 Notes</h1>

<p>Select your semester to view notes.</p>

</header>

<div class="container">

<a href="/paper1/" class="semester-card">

<div class="left">
<i class="fa-solid fa-book-open"></i>
<h3>Semester 1</h3>
</div>

<i class="fa-solid fa-chevron-right arrow"></i>

</a>

<a href="/paper2/" class="semester-card">

<div class="left">
<i class="fa-solid fa-book-open"></i>
<h3>Semester 2</h3>
</div>

<i class="fa-solid fa-chevron-right arrow"></i>

</a>

<a href="/paper3/" class="semester-card">

<div class="left">
<i class="fa-solid fa-book-open"></i>
<h3>Semester 3</h3>
</div>

<i class="fa-solid fa-chevron-right arrow"></i>

</a>

<a href="/paper4/" class="semester-card">

<div class="left">
<i class="fa-solid fa-book-open"></i>
<h3>Semester 4</h3>
</div>

<i class="fa-solid fa-chevron-right arrow"></i>

</a>

<a href="/paper5/" class="semester-card">

<div class="left">
<i class="fa-solid fa-book-open"></i>
<h3>Semester 5</h3>
</div>

<i class="fa-solid fa-chevron-right arrow"></i>

</a>

<a href="/paper6/" class="semester-card">

<div class="left">
<i class="fa-solid fa-book-open"></i>
<h3>Semester 6</h3>
</div>

<i class="fa-solid fa-chevron-right arrow"></i>

</a>

</div>

<footer>

<p>© 2026 AttendX. All Rights Reserved.</p>

</footer>

</body>

</html>
